<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDY — Fragrance Mist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #1B6B5A; --cream: #F5EDD8; --ink: #1a1a18; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 1.8rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.45em;
    color: var(--ink);
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0.65;
  }

  /* Hero — two column */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 3rem 3rem 4rem;
    gap: 2rem;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  .hero-copy {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.5em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }

  .hero-headline {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 2rem;
  }

  .hero-headline em {
    font-style: italic;
    color: var(--teal);
  }

  .rule {
    width: 22px;
    height: 1px;
    background: var(--teal);
    opacity: 0.35;
    margin-bottom: 2rem;
  }

  .hero-body {
    font-size: 13px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.55;
    line-height: 1.85;
    margin-bottom: 2.5rem;
    max-width: 340px;
  }

  .launching {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--teal);
  }

  /* Hero image */
  .hero-image {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-image img {
    width: 100%;
    max-width: 420px;
    height: auto;
    display: block;
    border-radius: 2px;
  }

  /* Footer */
  .footer {
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 0.5px solid rgba(27,107,90,0.1);
  }

  .footer span {
    font-size: 10px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.28;
    letter-spacing: 0.06em;
  }

  .footer .footer-logo {
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 400;
    font-size: 11px;
  }

  /* Mobile */
  @media (max-width: 700px) {
    .header { padding: 1.2rem 1.5rem; }
    .hero {
      grid-template-columns: 1fr;
      padding: 2rem 1.5rem 3rem;
      text-align: center;
    }
    .hero-copy { align-items: center; }
    .rule { margin: 0 auto 2rem; }
    .hero-body { max-width: 100%; }
    .hero-image { order: -1; }
    .hero-image img { max-width: 280px; }
    .hero-headline { font-size: 28px; }
    .footer { padding: 1.2rem 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>

<header class="header">
  <span class="logo">RDY</span>
  <span class="header-sub">Fragrance Mist</span>
</header>

<section class="hero">
  <div class="hero-copy">
    <p class="hero-wordmark">RDY</p>
    <h1 class="hero-headline">Cologne for the morning.<br><em>RDY for the rest.</em></h1>
    <div class="rule"></div>
    <p class="hero-body">A premium men's fragrance mist designed for daytime reapplication. Built for the office, the commute, the gym and everything in between.</p>
    <p class="launching">Launching soon</p>
  </div>
  <div class="hero-image">
    <img src="hero.jpg" alt="RDY Copper Fragrance Mist" />
  </div>
</section>

<footer class="footer">
  <span class="footer-logo">RDY</span>
  <span>getrdy.co</span>
  <span>© 2026 RDY</span>
</footer>

</body>
</html>
